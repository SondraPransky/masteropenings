<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EECoach — Tableau de bord Prof</title>
<script>!function(){var t=localStorage.getItem('mc_theme')||'light';if(t==='dark')document.documentElement.setAttribute('data-theme','dark')}()</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8fafc; --surf: #ffffff; --surf2: #f1f5f9; --surf3: #e2e8f0;
  --border: rgba(15,23,42,.09); --border-h: rgba(15,23,42,.18);
  --cyan: #6366f1; --cyan-dim: rgba(99,102,241,.08); --cyan-glow: rgba(99,102,241,.22);
  --gold: #d97706; --gold-dim: rgba(217,119,6,.08);
  --blue: #0284c7; --blue-dim: rgba(2,132,199,.08);
  --green: #059669; --green-dim: rgba(5,150,105,.08);
  --red: #e11d48; --red-dim: rgba(225,29,72,.08);
  --violet: #7c3aed; --violet-dim: rgba(124,58,237,.08);
  --text: #0f172a; --text-2: #475569; --dim: #94a3b8;
  --r: 10px; --rs: 6px;
  --shadow-sm: 0 1px 3px rgba(15,23,42,.08), 0 1px 2px rgba(15,23,42,.06);
  --shadow: 0 4px 12px rgba(15,23,42,.08), 0 2px 4px rgba(15,23,42,.06);
  --shadow-lg: 0 20px 48px rgba(15,23,42,.14), 0 8px 16px rgba(15,23,42,.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 58px;
  background: rgba(255,255,255,.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50;
}
.logo { font-weight: 800; font-size: 1rem; display: flex; align-items: center; gap: 5px; }
.logo em { color: var(--cyan); font-style: normal; }
.nav-back {
  font-size: .75rem; color: var(--dim); text-decoration: none;
  padding: 4px 9px; border-radius: var(--rs); transition: .15s;
  border: 1px solid transparent;
}
.nav-back:hover { color: var(--text); border-color: var(--border); background: var(--surf2); }
.nav-right { display: flex; align-items: center; gap: 8px; }

/* ── AUTH OVERLAY ── */
#auth-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.auth-box {
  background: var(--surf); border: 1px solid var(--border); border-radius: var(--r);
  padding: 40px; width: 380px; max-width: 95vw; box-shadow: var(--shadow-lg);
}
.auth-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
.auth-sub { font-size: .84rem; color: var(--dim); margin-bottom: 24px; }
.auth-free { font-size: .78rem; color: var(--dim); margin-top: 10px; text-align: center; }
.auth-free a { color: var(--cyan); cursor: pointer; }

/* ── CARDS / LAYOUT ── */
.page { display: none; padding: 20px; }
.page.on { display: block; }
.card { background: var(--surf); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; box-shadow: var(--shadow-sm); }
.clabel { font-size: .67rem; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--dim); margin-bottom: 14px; }

.admin-grid { display: grid; grid-template-columns: 260px 1fr; gap: 16px; align-items: start; margin-top: 16px; }
@media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }

/* KPI row */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 0; }
@media (max-width: 700px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
.kpi { background: var(--surf); border: 1px solid var(--border); border-radius: var(--r); padding: 18px 16px; }
.kpi-val { font-size: 1.8rem; font-weight: 700; line-height: 1; }
.kpi-lbl { font-size: .65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 5px; font-weight: 600; }

/* Student list */
.student-list { display: flex; flex-direction: column; gap: 6px; }
.student-item {
  padding: 12px 14px; background: var(--surf2); border: 1px solid var(--border);
  border-left: 3px solid transparent; border-radius: var(--r); cursor: pointer; transition: .15s;
}
.student-item:hover { border-color: var(--border-h); background: var(--surf3); }
.student-item.on { border-color: rgba(99,102,241,.35); border-left-color: var(--cyan); background: rgba(99,102,241,.07); }
.student-name { font-weight: 600; font-size: .9rem; }
.student-meta { font-size: .72rem; color: var(--dim); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

/* Detail tabs */
.detail-tabs {
  display: flex; gap: 2px; background: var(--surf2); border-radius: var(--r);
  padding: 3px; margin-bottom: 16px; border: 1px solid var(--border);
}
.dtab {
  flex: 1; padding: 7px 10px; border-radius: var(--rs); border: none;
  font-family: inherit; font-size: .78rem; font-weight: 500;
  background: transparent; color: var(--dim); cursor: pointer; transition: .15s; text-align: center;
}
.dtab.on { background: var(--surf); color: var(--text); box-shadow: 0 1px 2px rgba(15,23,42,.06), 0 0 0 1px var(--border); font-weight: 600; }
.dtab:hover:not(.on) { color: var(--text-2); }

/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: .83rem; }
.data-table th {
  text-align: left; padding: 8px 12px; color: var(--dim);
  font-size: .66rem; letter-spacing: 1.5px; text-transform: uppercase;
  border-bottom: 1px solid var(--border); font-weight: 700; background: var(--surf2);
}
.data-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(15,23,42,.025); }

/* Badges */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: .67rem; font-weight: 700; border: 1px solid transparent; }
.badge-green  { background: rgba(5,150,105,.08);   color: #047857;      border-color: rgba(5,150,105,.2); }
.badge-red    { background: rgba(225,29,72,.07);   color: #be123c;      border-color: rgba(225,29,72,.2); }
.badge-gold   { background: rgba(217,119,6,.08);   color: var(--gold);  border-color: rgba(217,119,6,.2); }
.badge-cyan   { background: var(--cyan-dim);       color: var(--cyan);  border-color: rgba(99,102,241,.2); }
.badge-violet { background: rgba(124,58,237,.08);  color: var(--violet);border-color: rgba(124,58,237,.2); }
.badge-dim    { background: var(--surf2);           color: var(--dim); }

/* Prog bar */
.prog-bar { height: 4px; background: rgba(15,23,42,.07); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; }

/* Spark / timeline */
.spark-row { display: flex; align-items: flex-end; gap: 2px; height: 28px; }
.spark-b { width: 8px; border-radius: 2px; background: var(--cyan-dim); }
.spark-b.has { background: var(--cyan); }

/* Section header */
.sec-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.sec-head h3 { font-size: .9rem; font-weight: 700; }

/* Detail student header */
.det-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.det-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--cyan-dim); color: var(--cyan);
  font-size: 1.2rem; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid rgba(99,102,241,.25); flex-shrink: 0;
}
.det-name { font-size: 1.1rem; font-weight: 700; }
.det-meta { font-size: .75rem; color: var(--dim); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }

/* Mini KPIs inside detail */
.mini-kpis { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
.mini-kpi { background: var(--surf2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 10px; text-align: center; }
.mini-kpi .val { font-size: 1.4rem; font-weight: 700; line-height: 1; }
.mini-kpi .lbl { font-size: .62rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; font-weight: 600; }

/* PGN viewer */
.pgn-box {
  background: var(--surf2); border: 1px solid var(--border); border-radius: var(--r);
  padding: 12px 14px; font-family: 'JetBrains Mono', monospace;
  font-size: .75rem; line-height: 1.8; color: var(--text-2);
  max-height: 140px; overflow-y: auto; word-break: break-word;
  margin-top: 8px;
}

/* Inputs & buttons (compact) */
input[type=text], input[type=password] {
  padding: 9px 12px; background: var(--surf2); border: 1px solid var(--border);
  border-radius: var(--rs); color: var(--text); font-family: inherit; font-size: .875rem;
  outline: none; transition: .15s;
}
input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px var(--cyan-dim); }
input::placeholder { color: var(--dim); }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--rs); border: none; font-family: inherit;
  font-weight: 600; font-size: .835rem; cursor: pointer; transition: .15s; white-space: nowrap;
}
.btn-gold { background: var(--gold); color: #fff; }
.btn-gold:hover { filter: brightness(1.08); }
.btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surf2); color: var(--text); }
.btn-primary { background: var(--cyan); color: #fff; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-red { background: var(--red); color: #fff; }
.btn-sm { padding: 5px 12px; font-size: .775rem; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

.empty { text-align: center; padding: 48px 20px; color: var(--dim); }
.empty-ico { font-size: 2rem; margin-bottom: 10px; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 2px; }

.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 300;
  background: var(--surf); border: 1px solid var(--border); border-radius: var(--r);
  padding: 10px 16px; font-size: .83rem; font-weight: 500;
  transform: translateY(60px); opacity: 0; transition: .25s; pointer-events: none;
  box-shadow: var(--shadow);
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.ok { border-color: rgba(5,150,105,.35); color: #047857; }

/* ══ DARK MODE ══════════════════════════════════ */
[data-theme="dark"] {
  --bg:        #080c14;
  --surf:      #0e1520;
  --surf2:     #151e2d;
  --surf3:     #1c2740;
  --border:    rgba(148,163,184,.09);
  --border-h:  rgba(148,163,184,.18);
  --cyan-dim:  rgba(99,102,241,.12);
  --cyan-glow: rgba(99,102,241,.3);
  --gold:      #f59e0b;
  --gold-dim:  rgba(245,158,11,.14);
  --blue:      #38bdf8;
  --blue-dim:  rgba(56,189,248,.12);
  --green:     #34d399;
  --green-dim: rgba(52,211,153,.12);
  --red:       #fb7185;
  --red-dim:   rgba(251,113,133,.12);
  --violet:    #a78bfa;
  --violet-dim:rgba(167,139,250,.12);
  --text:      #f1f5f9;
  --text-2:    #94a3b8;
  --dim:       #64748b;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.25);
  --shadow:    0 4px 16px rgba(0,0,0,.55), 0 1px 4px rgba(0,0,0,.3);
  --shadow-lg: 0 16px 56px rgba(0,0,0,.75), 0 4px 14px rgba(0,0,0,.4);
}
[data-theme="dark"] nav { background: rgba(8,12,20,.93); }
[data-theme="dark"] .btn-gold { color: #000; }
[data-theme="dark"] .badge-green  { background: var(--green-dim); color: var(--green); border-color: rgba(52,211,153,.2); }
[data-theme="dark"] .badge-red    { background: var(--red-dim);   color: var(--red);   border-color: rgba(251,113,133,.2); }
[data-theme="dark"] .badge-gold   { background: var(--gold-dim);  color: var(--gold);  border-color: rgba(245,158,11,.2); }
[data-theme="dark"] .badge-violet { background: var(--violet-dim);color: var(--violet);border-color: rgba(167,139,250,.2); }
[data-theme="dark"] .data-table tr:hover td { background: rgba(255,255,255,.018); }
[data-theme="dark"] .prog-bar { background: rgba(255,255,255,.06); }
[data-theme="dark"] .dtab.on { box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 0 0 1px var(--border); }
[data-theme="dark"] .toast.ok { border-color: rgba(52,211,153,.4);  color: var(--green); }
[data-theme="dark"] #auth-overlay { background: var(--bg); }

/* Toggle thème */
#theme-toggle {
  width: 32px; height: 32px;
  border-radius: var(--rs);
  border: 1px solid var(--border);
  background: var(--surf2);
  color: var(--dim);
  font-size: .95rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: .15s; flex-shrink: 0; padding: 0; line-height: 1;
}
#theme-toggle:hover { background: var(--surf3); color: var(--text); }
</style>
</head>
<body>

<nav>
  <div class="logo">♟ EE<em>Coach</em></div>
  <div class="nav-right">
    <button id="theme-toggle" onclick="toggleTheme()" title="Changer de thème">🌙</button>
    <button class="btn btn-ghost btn-sm" onclick="exportAll()">⬇ Exporter tout</button>
    <a href="landing.html" class="nav-back">← Accueil</a>
  </div>
</nav>

<!-- ══ AUTH ══════════════════════════════════ -->
<div id="auth-overlay">
  <div class="auth-box">
    <div class="auth-title">📋 Espace professeur</div>
    <div class="auth-sub">Tableau de bord et archives des élèves</div>
    <div style="margin-bottom:10px">
      <input type="password" id="auth-pin" placeholder="Mot de passe…" style="width:100%"
             onkeydown="if(event.key==='Enter')verifyPin()">
      <div id="auth-error" style="display:none;font-size:.75rem;color:var(--red);margin-top:6px">Mot de passe incorrect</div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="verifyPin()">Accéder →</button>
    <div id="auth-bypass" class="auth-free"><a onclick="skipAuth()">Accès sans mot de passe →</a></div>
  </div>
</div>

<!-- ══ DASHBOARD ════════════════════════════ -->
<div id="dashboard" class="page">

  <!-- KPIs -->
  <div class="kpi-row" id="kpi-row"></div>

  <!-- Grid: liste étudiants | détail -->
  <div class="admin-grid">

    <!-- Gauche : liste élèves -->
    <div class="card">
      <div class="clabel">Élèves</div>
      <div id="student-list-admin" class="student-list"></div>
    </div>

    <!-- Droite : détail -->
    <div class="card" id="detail-area">
      <div class="empty"><div class="empty-ico">👆</div>Sélectionnez un élève</div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Thème ──────────────────────────────────────────────
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = dark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mc_theme', next);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
}
document.addEventListener('DOMContentLoaded', function() {
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
});

// ══════════════════════════════════════════
//  Lecture localStorage
// ══════════════════════════════════════════
function loadData() {
  return {
    drills:   JSON.parse(localStorage.getItem('mc_drills')   || '[]'),
    results:  JSON.parse(localStorage.getItem('mc_results')  || '[]'),
    practice: JSON.parse(localStorage.getItem('mc_practice') || '[]'),
    games:    JSON.parse(localStorage.getItem('mc_games')    || '[]'),
    mastery:  JSON.parse(localStorage.getItem('mc_mastery')  || '{}'),
    accounts: JSON.parse(localStorage.getItem('mc_accounts') || '[]'),
  };
}

let D = loadData();
let currentStudent = null;
let currentTab = 'sessions';

// ══════════════════════════════════════════
//  Auth
// ══════════════════════════════════════════
(function checkAuth() {
  const pin = localStorage.getItem('mc_prof_pin');
  if (!pin) { skipAuth(); return; }
  document.getElementById('auth-bypass').style.display = 'none';
})();

function verifyPin() {
  const pin = localStorage.getItem('mc_prof_pin');
  const entered = document.getElementById('auth-pin').value;
  if (!pin || entered === pin) {
    skipAuth();
  } else {
    document.getElementById('auth-error').style.display = 'block';
  }
}

function skipAuth() {
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('dashboard').classList.add('on');
  renderDashboard();
}

// ══════════════════════════════════════════
//  Dashboard
// ══════════════════════════════════════════
function renderDashboard() {
  D = loadData();

  // Gather all student names
  const fromResults  = D.results.map(r => r.student).filter(Boolean);
  const fromPractice = D.practice.map(p => p.student).filter(Boolean);
  const fromAccounts = D.accounts.map(a => a.name);
  const allNames = [...new Set([...fromAccounts, ...fromResults, ...fromPractice])].sort();

  // Global KPIs
  const totalSessions = D.practice.length;
  const allPcts = D.practice.filter(p => p.pct != null).map(p => p.pct);
  const avgPct  = allPcts.length ? Math.round(allPcts.reduce((s, v) => s + v, 0) / allPcts.length) : 0;
  const today   = new Date().toDateString();
  const todaySessions = D.practice.filter(p => new Date(p.ts).toDateString() === today).length;

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi"><div class="kpi-val" style="color:var(--cyan)">${allNames.length}</div><div class="kpi-lbl">Élèves</div></div>
    <div class="kpi"><div class="kpi-val">${totalSessions}</div><div class="kpi-lbl">Sessions</div></div>
    <div class="kpi"><div class="kpi-val" style="color:${avgPct>=70?'var(--green)':avgPct>=50?'var(--gold)':'var(--red)'}">${avgPct}%</div><div class="kpi-lbl">Réussite moy.</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--green)">${todaySessions}</div><div class="kpi-lbl">Aujourd'hui</div></div>
  `;

  // Student list
  const listEl = document.getElementById('student-list-admin');
  if (!allNames.length) {
    listEl.innerHTML = '<div class="empty" style="padding:24px 0"><div class="empty-ico">🎓</div>Aucun élève enregistré</div>';
    return;
  }
  listEl.innerHTML = allNames.map(name => {
    const sessions = D.practice.filter(p => p.student === name);
    const lastTs   = sessions.length ? Math.max(...sessions.map(p => p.ts || 0)) : 0;
    const avgS     = sessions.length ? Math.round(sessions.reduce((s, p) => s + (p.pct||0), 0) / sessions.length) : 0;
    const lastDate = lastTs ? fmtDate(lastTs) : 'Jamais';
    return `
      <div class="student-item${currentStudent===name?' on':''}" onclick="showStudent('${escHtml(name)}')">
        <div class="student-name">${escHtml(name)}</div>
        <div class="student-meta">${sessions.length} session${sessions.length>1?'s':''} · ${avgS}% · ${lastDate}</div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  Détail élève
// ══════════════════════════════════════════
function showStudent(name) {
  currentStudent = name;
  currentTab = 'sessions';
  renderDashboard(); // re-render list to update .on class

  const area = document.getElementById('detail-area');
  const sessions  = D.practice.filter(p => p.student === name);
  const results   = D.results.filter(r => r.student === name);
  const games     = D.games.filter(g => g.student === name);
  const mastKeys  = Object.keys(D.mastery).filter(k => k.startsWith(name + '_'));

  const totalOk   = results.filter(r => r.correct).length;
  const totalKo   = results.filter(r => !r.correct).length;
  const avgPct    = sessions.length ? Math.round(sessions.reduce((s, p) => s + (p.pct||0), 0) / sessions.length) : 0;

  area.innerHTML = `
    <div class="det-header">
      <div class="det-avatar">${name[0].toUpperCase()}</div>
      <div>
        <div class="det-name">${escHtml(name)}</div>
        <div class="det-meta">${sessions.length} session${sessions.length!==1?'s':''} · depuis ${sessions.length?fmtDate(Math.min(...sessions.map(p=>p.ts||Date.now()))):'—'}</div>
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="deleteStudentData('${escHtml(name)}')">🗑 Supprimer</button>
    </div>

    <div class="mini-kpis">
      <div class="mini-kpi"><div class="val" style="color:var(--cyan)">${avgPct}%</div><div class="lbl">Réussite moy.</div></div>
      <div class="mini-kpi"><div class="val" style="color:var(--green)">${totalOk}</div><div class="lbl">Corrects</div></div>
      <div class="mini-kpi"><div class="val" style="color:var(--red)">${totalKo}</div><div class="lbl">Erreurs</div></div>
    </div>

    <div class="detail-tabs">
      <button class="dtab${currentTab==='sessions'?' on':''}" onclick="switchTab('sessions','${escHtml(name)}')">📅 Sessions</button>
      <button class="dtab${currentTab==='errors'?' on':''}"   onclick="switchTab('errors','${escHtml(name)}')">❌ Erreurs</button>
      <button class="dtab${currentTab==='mastery'?' on':''}"  onclick="switchTab('mastery','${escHtml(name)}')">🧠 Maîtrise</button>
      <button class="dtab${currentTab==='games'?' on':''}"    onclick="switchTab('games','${escHtml(name)}')">♟ Parties</button>
    </div>

    <div id="tab-content">${renderTab(currentTab, name)}</div>
  `;
}

function switchTab(tab, name) {
  currentTab = tab;
  document.querySelectorAll('.dtab').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  document.getElementById('tab-content').innerHTML = renderTab(tab, name);
}

function renderTab(tab, name) {
  if (tab === 'sessions') return renderSessions(name);
  if (tab === 'errors')   return renderErrors(name);
  if (tab === 'mastery')  return renderMastery(name);
  if (tab === 'games')    return renderGames(name);
  return '';
}

// ── Onglet Sessions ──────────────────────
function renderSessions(name) {
  const sessions = D.practice.filter(p => p.student === name)
    .sort((a, b) => (b.ts||0) - (a.ts||0));
  if (!sessions.length) return empty('Aucune session enregistrée');

  return `
    <table class="data-table">
      <thead><tr><th>Date</th><th>Module</th><th>Score</th><th>✓</th><th>✗</th></tr></thead>
      <tbody>
        ${sessions.map(s => `
          <tr>
            <td style="font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--dim)">${fmtDateFull(s.ts)}</td>
            <td style="font-weight:500">${escHtml(s.drillName || '—')}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="prog-bar" style="width:60px"><div class="prog-fill" style="width:${s.pct||0}%;background:${(s.pct||0)>=70?'var(--green)':(s.pct||0)>=50?'var(--gold)':'var(--red)'}"></div></div>
                <span style="font-weight:700;color:${(s.pct||0)>=70?'var(--green)':(s.pct||0)>=50?'var(--gold)':'var(--red)'}">${s.pct||0}%</span>
              </div>
            </td>
            <td style="color:var(--green);font-weight:600">${s.ok||0}</td>
            <td style="color:var(--red);font-weight:600">${s.ko||0}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── Onglet Erreurs ───────────────────────
function renderErrors(name) {
  const results = D.results.filter(r => r.student === name && !r.correct);
  if (!results.length) return `<div class="empty"><div class="empty-ico">✅</div>Aucune erreur enregistrée — parfait !</div>`;

  // Regrouper par (drill, san)
  const map = {};
  results.forEach(r => {
    const k = `${r.drillId}_${r.san}`;
    if (!map[k]) map[k] = { drillName: r.drillName||'?', san: r.san||'?', fails: 0, lastTs: 0 };
    map[k].fails++;
    if (r.ts > map[k].lastTs) map[k].lastTs = r.ts;
  });
  const sorted = Object.values(map).sort((a, b) => b.fails - a.fails).slice(0, 20);

  return `
    <table class="data-table">
      <thead><tr><th>Module</th><th>Coup</th><th>Erreurs</th><th>Dernière fois</th></tr></thead>
      <tbody>
        ${sorted.map(e => `
          <tr>
            <td style="color:var(--text-2);font-size:.82rem">${escHtml(e.drillName)}</td>
            <td><code style="background:var(--red-dim);color:var(--red);padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:.8rem;border:1px solid rgba(251,113,133,.2)">${escHtml(e.san)}</code></td>
            <td><span class="badge badge-red">${e.fails}×</span></td>
            <td style="font-size:.78rem;color:var(--dim);font-family:'JetBrains Mono',monospace">${fmtDate(e.lastTs)}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── Onglet Maîtrise ──────────────────────
function renderMastery(name) {
  const mastKeys = Object.keys(D.mastery).filter(k => k.startsWith(name + '_'));
  if (!mastKeys.length) return empty('Aucune donnée SM-2');

  const now = Date.now();
  const rows = mastKeys.map(k => {
    const m = D.mastery[k];
    const parts = k.split('_');
    // key format: student_drillId_posIdx_san
    const drillId = parts[1] || '?';
    const san     = parts.slice(3).join('_') || parts[parts.length-1] || '?';
    const drill   = D.drills.find(d => d.id === drillId);
    const due = m.due || 0;
    const interval = m.interval || 0;
    const status = !m.due ? 'nouveau' : due <= now ? 'dû' : 'maîtrisé';
    return { drillName: drill?.name || drillId, san, interval, due, status, ef: m.ef || 2.5, reps: m.reps || 0 };
  }).sort((a, b) => a.due - b.due);

  const dueCnt      = rows.filter(r => r.status === 'dû').length;
  const masteredCnt = rows.filter(r => r.status === 'maîtrisé').length;

  return `
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <span class="badge badge-red">${dueCnt} à réviser</span>
      <span class="badge badge-green">${masteredCnt} maîtrisés</span>
      <span class="badge badge-cyan">${rows.length} positions total</span>
    </div>
    <table class="data-table">
      <thead><tr><th>Module</th><th>Coup</th><th>Répétitions</th><th>Intervalle</th><th>État</th></tr></thead>
      <tbody>
        ${rows.slice(0, 40).map(r => `
          <tr>
            <td style="font-size:.8rem;color:var(--text-2)">${escHtml(r.drillName)}</td>
            <td><code style="font-family:'JetBrains Mono',monospace;font-size:.8rem">${escHtml(r.san)}</code></td>
            <td style="font-family:'JetBrains Mono',monospace;font-size:.8rem">${r.reps}</td>
            <td style="font-family:'JetBrains Mono',monospace;font-size:.8rem">${r.interval}j</td>
            <td>${r.status==='dû'
              ? '<span class="badge badge-red">À réviser</span>'
              : r.status==='maîtrisé'
              ? '<span class="badge badge-green">Maîtrisé</span>'
              : '<span class="badge badge-dim">Nouveau</span>'}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── Onglet Parties ───────────────────────
function renderGames(name) {
  const games = D.games.filter(g => g.student === name).sort((a, b) => (b.ts||0) - (a.ts||0));
  if (!games.length) return empty('Aucune partie Maia enregistrée');

  return games.map(g => {
    const result = g.result || '?';
    const color  = result === '1-0' ? (g.side==='w'?'var(--green)':'var(--red)')
                 : result === '0-1' ? (g.side==='b'?'var(--green)':'var(--red)')
                 : 'var(--dim)';
    const label  = result === '1-0' ? (g.side==='w'?'Victoire':'Défaite')
                 : result === '0-1' ? (g.side==='b'?'Victoire':'Défaite')
                 : 'Nulle';
    return `
      <div style="background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-weight:700;color:${color}">${label}</span>
            <span style="font-size:.75rem;color:var(--dim)">${escHtml(g.drillName||'Libre')} · ${escHtml(g.level||'?')}</span>
          </div>
          <span style="font-size:.72rem;color:var(--dim);font-family:'JetBrains Mono',monospace">${fmtDateFull(g.ts)}</span>
        </div>
        <div class="pgn-box">${escHtml(g.pgn || '—')}</div>
        <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="copyPgn(${JSON.stringify(g.pgn||'')})">Copier PGN</button>
      </div>`;
  }).join('');
}

function copyPgn(pgn) {
  navigator.clipboard.writeText(pgn).then(() => toast('PGN copié !', 'ok'));
}

// ── Actions ──────────────────────────────
function deleteStudentData(name) {
  if (!confirm(`Supprimer toutes les données de ${name} ? Cette action est irréversible.`)) return;

  D.results  = D.results.filter(r => r.student !== name);
  D.practice = D.practice.filter(p => p.student !== name);
  D.games    = D.games.filter(g => g.student !== name);
  for (const k of Object.keys(D.mastery)) {
    if (k.startsWith(name + '_')) delete D.mastery[k];
  }
  D.accounts = D.accounts.filter(a => a.name !== name);

  localStorage.setItem('mc_results',  JSON.stringify(D.results));
  localStorage.setItem('mc_practice', JSON.stringify(D.practice));
  localStorage.setItem('mc_games',    JSON.stringify(D.games));
  localStorage.setItem('mc_mastery',  JSON.stringify(D.mastery));
  localStorage.setItem('mc_accounts', JSON.stringify(D.accounts));

  currentStudent = null;
  document.getElementById('detail-area').innerHTML = '<div class="empty"><div class="empty-ico">👆</div>Sélectionnez un élève</div>';
  renderDashboard();
  toast(`Données de ${name} supprimées`, 'ok');
}

function exportAll() {
  const data = {
    exportedAt: new Date().toISOString(),
    drills:   D.drills,
    results:  D.results,
    practice: D.practice,
    games:    D.games,
    mastery:  D.mastery,
    accounts: D.accounts,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'eecoach-export-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Export téléchargé', 'ok');
}

// ── Helpers ──────────────────────────────
function empty(msg) {
  return `<div class="empty"><div class="empty-ico">📭</div>${msg}</div>`;
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'short'});
}
function fmtDateFull(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'short', year:'2-digit'})
       + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = 'toast', 2800);
}
</script>
</body>
</html>
