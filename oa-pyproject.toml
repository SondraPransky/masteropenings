# Trace des dependances du package vendore `oa/` (copie du package
# `opening_analytics` du projet « Ouvertures - data », 2026-07-21).
# ⚠ STATUT REVISE (23/07/2026) : le dossier local "Desktop/Ouvertures - data"
# est SUPPRIME — `oa/` est desormais la copie de developpement, la seule a
# jour (elle porte le fix timeout OA_STOCKFISH_MAX_S, absent de la source).
# L'historique et les tests de la source restent clonables :
# https://github.com/SondraPransky/opening-analytics (pousse a jour au 23/07).
# Ne JAMAIS re-vendorer par-dessus oa/ : ca reintroduirait le worker qui se
# fige. Cette copie sert le worker Supabase D18 (`oa/eecoach_worker.py`). Les
# DONNEES (cache sqlite, 0 secret) ne sont JAMAIS copiees : `data-oa/` est
# gitignore et le token Lichess vit dans l'env (`OA_LICHESS_TOKEN`), jamais
# dans le code.

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "oa"
version = "0.1.0"
description = "Human Opening Analytics — erreurs humaines par tranche Elo (vendore pour le worker Supabase EECoach)"
requires-python = ">=3.10"
dependencies = [
  "chess>=1.10",   # python-chess (pipeline, SAN, FEN-4)
  "flask>=3.0",    # webapp.py (non utilise par le worker, garde pour copie fidele)
]
